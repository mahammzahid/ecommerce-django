<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Ecommerce</title>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="{% url 'product-list' %}">
        🛒 MyStore
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'product-list' %}">Products</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'cart-page' %}">Cart</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'order-history' %}">My Orders</a>
            </li>

            {% if request.user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link">Hi, {{ request.user.username }}</span>
                </li>

                <li class="nav-item">
                    <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                      {% csrf_token %}
                    <button type="submit" class="btn btn-link nav-link text-danger" style="border:none;">
                      Logout
                    </button>
                </form>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/login/">Login</a>
                </li>
            {% endif %}

        </ul>

    </div>
  </div>
</nav>

<hr>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
